name: Canary

on:
  push:
    branches: [canary]

concurrency:
  group: canary-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  qa:
    name: QA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  canary:
    name: Canary Release
    runs-on: ubuntu-latest
    needs: [qa]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - name: Build packages
        run: pnpm build

      - name: Set canary version
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          node -e "
            const fs = require('fs');
            for (const pkg of ['packages/react', 'packages/styles']) {
              const path = pkg + '/package.json';
              const json = JSON.parse(fs.readFileSync(path, 'utf8'));
              json.version = json.version.replace(/^(\d+\.\d+\.\d+).*/, '\$1-canary.${TIMESTAMP}.${COMMIT_SHA}');
              fs.writeFileSync(path, JSON.stringify(json, null, 2) + '\n');
              console.log(json.name + '@' + json.version);
            }
          "

      - name: Publish canary
        run: |
          cd packages/styles && pnpm publish --tag canary --no-git-checks --access public
          cd ../react && pnpm publish --tag canary --no-git-checks --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
