name: Bug Report
title: "[BUG] "
description: Report a bug to help us improve fried-ui
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please check:
        - [Open issues](https://github.com/fried-day/fried-ui/issues?q=is%3Aissue+is%3Aopen)
        - [Closed issues](https://github.com/fried-day/fried-ui/issues?q=is%3Aissue+is%3Aclosed)
        - [Discussions](https://github.com/fried-day/fried-ui/discussions)
  - type: input
    id: version
    attributes:
      label: Version
      description: Package and version (e.g. @fried-ui/react@0.1.0)
      placeholder: "@fried-ui/react@0.1.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: input
    id: link
    attributes:
      label: Reproduction URL
      description: Minimal reproduction via StackBlitz or GitHub repo. No localhost.
      placeholder: "https://stackblitz.com/edit/..."
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: screenshots_or_videos
    attributes:
      label: Screenshots or Videos
      description: If applicable.
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15, Windows 11, Ubuntu 24"
    validations:
      required: true
  - type: dropdown
    id: browser_type
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true
